{% extends "hr/base.html" %}

{% block content %}
<h3>Delete Attendance Schedule</h3>

<p>Are you sure you want to delete <strong>{{ schedule.name }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'attendance_schedule_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
