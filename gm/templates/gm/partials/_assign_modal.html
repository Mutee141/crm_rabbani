<div class="modal fade" id="assignModal" tabindex="-1" aria-labelledby="assignModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="assignModalLabel">
                    <i class="fas fa-user-plus me-2"></i>Assign Managers
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="POST" action="{% url 'gm:manager_assign' %}">
                {% csrf_token %}
                <div class="modal-body p-4">
                    <input type="hidden" name="gm_id" id="modal_gm_id">
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Managers to Assign</label>
                        <select name="manager_ids" class="form-select" multiple size="8" required>
                            {% for manager in unassigned_managers %}
                                <option value="{{ manager.id }}">{{ manager.get_full_name }} ({{ manager.emp_id }})</option>
                            {% empty %}
                                <option disabled>No available managers found</option>
                            {% endfor %}
                        </select>
                        <div class="form-text text-muted mt-2">
                            <i class="fas fa-info-circle me-1"></i> Hold Ctrl (or Cmd) to select multiple managers.
                        </div>
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Assignments</button>
                </div>
            </form>
        </div>
    </div>
</div>
